<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSC 5</title>

<style>
body{
  margin:0;
  background:#ffffff;
  color:#000;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
}

/* 상단 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:2px solid #000;
}

.brand{
  font-size:26px;
  font-weight:900;
}

button{
  border:2px solid #000;
  background:#fff;
  padding:8px 14px;
  font-weight:900;
  cursor:pointer;
}

.status{
  text-align:center;
  font-weight:900;
  margin:12px 0;
}

/* 메인 영역 */
.viewer{
  position:relative;
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

/* 텍스트 박스 */
.box{
  border:2px solid #000;
  padding:28px;
  white-space:pre-wrap;
  line-height:1.7;
  font-size:18px;
  min-height:60vh;
}

/* 화살표 버튼 */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #000;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  cursor:pointer;
  transition:0.2s;
}

.arrow:hover{
  background:#000;
  color:#fff;
}

#prev{ left:-70px; }
#next{ right:-70px; }

/* 모바일 */
@media (max-width:1000px){
  #prev{ left:-10px; }
  #next{ right:-10px; }
}

@media (max-width:600px){
  .box{font-size:16px; padding:20px;}
  .arrow{
    width:44px;
    height:44px;
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">TSC 5 30페이지까지</div>
  <button id="reload">새로고침(26.03.02)</button>
</div>

<div class="status" id="status">불러오는 중...</div>

<div class="viewer">
  <div id="prev" class="arrow">←</div>

  <div id="content" class="box">
    data.txt 불러오는 중...
  </div>

  <div id="next" class="arrow">→</div>
</div>

<script>
const FILE_URL = "TSC5.txt";

let pages = [];
let idx = 0;

function normalize(text){
  return text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
}

function splitPages(text){
  const raw = text.split(/\n\s*-{3,}\s*\n/g);
  return raw.map(s => s.trim()).filter(Boolean);
}

function render(){
  const st = document.getElementById("status");
  const box = document.getElementById("content");

  if(!pages.length){
    st.textContent = "데이터 없음";
    box.textContent = "data.txt 확인";
    return;
  }

  if(idx < 0) idx = 0;
  if(idx >= pages.length) idx = pages.length - 1;

  st.textContent = `${idx+1} / ${pages.length}`;
  box.textContent = pages[idx];
}

function next(){
  if(!pages.length) return;
  idx = (idx + 1) % pages.length;
  render();
}

function prev(){
  if(!pages.length) return;
  idx = (idx - 1 + pages.length) % pages.length;
  render();
}

async function loadFile(){
  try{
    const res = await fetch(FILE_URL + "?ts=" + Date.now(), {cache:"no-store"});
    const text = normalize(await res.text());
    pages = splitPages(text);
    idx = 0;
    render();
  }catch(e){
    document.getElementById("status").textContent = "파일 못 불러옴";
  }
}

document.getElementById("next").addEventListener("click", next);
document.getElementById("prev").addEventListener("click", prev);
document.getElementById("reload").addEventListener("click", loadFile);

window.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowRight") next();
  if(e.key === "ArrowLeft") prev();
});

loadFile();
</script>

</body>

</html>
